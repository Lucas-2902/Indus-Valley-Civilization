<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Facts - Indus Valley Civilization</title>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <script src="https://kit.fontawesome.com/1a28f22896.js" crossorigin="anonymous"></script>

        <div id="header">
            <div id="logo">
                <p>Indus Valley</p>
            </div>

            <a href="index.html" class="inactive">Home</a>
            <a href="discovery.html" class="inactive">Discovery</a>
            <a href="geo.html" class="inactive">Geography</a>
            <a href="bricks.html" class="inactive">Architecture</a>
            <a href="artifacts.html" class="inactive">Artifacts</a>
            <a href="sports.html" class="active">Sports</a>
            <a href="decline.html" class="inactive">Decline</a>
            <a href="quiz.html" class="inactive">Quiz</a>
        </div>

        <div class="ui-layer">
            <div class="power-bar"><div id="player-power"></div></div>
            <div class="power-bar"><div id="ai-power"></div></div>
        </div>

        <div class="game-world">
            <div class="cloud" style="top: 10vh; animation-delay: 0s;"></div>
            <div class="cloud" style="top: 20vh; animation-delay: -5s;"></div>
            <div class="cloud" style="top: 5vh; animation-delay: -12s;"></div>

            <div class="city-bg"></div>

            <div class="arena-box" id="ring">
                <div id="playerMan" class="pixel-man player">
                    <div class="head-box">
                        <div class="ear left"></div><div class="ear right"></div>
                        <div class="eye left"></div><div class="eye right"></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="body-box"><div class="hand"></div></div>
                </div>

                <div id="aiMan" class="pixel-man ai">
                    <div class="head-box">
                        <div class="ear left"></div><div class="ear right"></div>
                        <div class="eye left"></div><div class="eye right"></div>
                        <div class="mouth"></div>
                    </div>
                    <div class="body-box"><div class="hand"></div></div>
                </div>
            </div>
        </div>

        <div class="shove-ui">
            <button class="shove-btn" onmousedown="push()" ontouchstart="push()">PUSH!!</button>
        </div>

        <script src="sports.js"></script>
    </body>
</html>
