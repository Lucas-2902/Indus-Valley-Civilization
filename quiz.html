<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quiz - Indus Valley Civilization</title>

        <link rel="stylesheet" href="quiz.css">
    </head>

    <body>
        <script src="https://kit.fontawesome.com/1a28f22896.js" crossorigin="anonymous"></script>

        <div id="header">
            <div id="logo">
                <p>Indus Valley</p>
            </div>

            <a href="index.html" class="inactive">Home</a>
            <a href="discovery.html" class="inactive">Discovery</a>
            <a href="geo.html" class="inactive">Geography</a>
            <a href="bricks.html" class="inactive">Architecture</a>
            <a href="artifacts.html" class="inactive">Artifacts</a>
            <a href="sports.html" class="inactive">Sports</a>
            <a href="society.html" class="inactive">Society</a>
            <a href="decline.html" class="inactive">Decline</a>
            <a href="quiz.html" class="active">Quiz</a>
        </div>

        <div class="quiz-container">
            <div class="controls">
                <button id="lang-toggle" class="circle-btn" title="Switch Language">हि</button>
                <div id="timer-container">
                    <button id="start-timer" class="circle-btn"><i class="fa-solid fa-play"></i></button>
                    <span id="time-left">30</span>
                </div>
            </div>

            <div class="question-box">
                <p id="question-text">Loading question...</p>
            </div>

            <div class="options-grid">
                <button class="option-btn" onclick="checkAnswer(0)"><span class="label">A:</span> <span class="opt-text"></span></button>
                <button class="option-btn" onclick="checkAnswer(1)"><span class="label">B:</span> <span class="opt-text"></span></button>
                <button class="option-btn" onclick="checkAnswer(2)"><span class="label">C:</span> <span class="opt-text"></span></button>
                <button class="option-btn" onclick="checkAnswer(3)"><span class="label">D:</span> <span class="opt-text"></span></button>
            </div>

            <div class="footer-controls">
                <button id="next-btn" onclick="nextQuestion()" style="display: none;">Next Question</button>
                <button id="finish-btn" onclick="finishQuiz()" style="display: none;">Thank You!</button>
            </div>
        </div>

        <script src="quiz.js"></script>
    </body>
</html>
